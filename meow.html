<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step2Track | Posture & Recovery Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        .branding-font { color: #0f766e; }
        .tagline-font { color: #ea580c; font-style: italic; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans text-gray-800 pb-20">

    <header class="bg-white border-b border-gray-200 p-4 shadow-sm">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center overflow-hidden border border-gray-300">
                    <i class="fa-solid fa-heart-pulse text-teal-700"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold branding-font">Step2Track</h1>
                    <p class="tagline-font text-sm">where every step matters</p>
                </div>
            </div>
            <div class="text-sm font-medium text-teal-700 bg-teal-50 px-3 py-1 rounded-full border border-teal-100">
                <i class="fa-solid fa-circle-dot animate-pulse mr-2"></i> System Active
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center p-4 gap-8">
        <section class="w-full max-w-5xl flex flex-col gap-6">
            <div class="relative rounded-2xl bg-gray-900 shadow-xl overflow-hidden aspect-video border-4 border-white ring-1 ring-gray-200">
                <div id="loading-overlay" class="absolute inset-0 bg-gray-100 flex flex-col items-center justify-center z-50">
                    <div class="animate-spin rounded-full h-10 w-10 border-t-4 border-teal-600 mb-4"></div>
                    <p class="text-gray-600 font-medium">Initializing camera...</p>
                </div>
                <video id="input-video" class="hidden" playsinline muted></video>
                <canvas id="output-canvas" class="w-full h-full object-cover"></canvas>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200 flex flex-wrap gap-6 items-center justify-between">
                <div class="flex flex-wrap gap-6">
                    <label class="flex items-center gap-2 cursor-pointer font-medium hover:text-teal-700 transition">
                        <input type="checkbox" id="toggle-palm" checked class="accent-teal-700 w-5 h-5"> Palm Landmarks
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer font-medium hover:text-teal-700 transition">
                        <input type="checkbox" id="toggle-glow" checked class="accent-teal-700 w-5 h-5"> Skeletal Glow
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer font-medium hover:text-teal-700 transition">
                        <input type="checkbox" id="toggle-joints" checked class="accent-teal-700 w-5 h-5"> Joint Dots
                    </label>
                </div>
                <button id="capture-btn" class="bg-teal-700 hover:bg-teal-800 text-white px-6 py-2 rounded-lg font-bold transition shadow-md flex items-center gap-2">
                    <i class="fa-solid fa-camera"></i> Capture Assessment
                </button>
            </div>
        </section>

        <section id="captured-section" class="w-full max-w-5xl hidden">
            <h2 class="text-xl font-bold text-gray-700 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-images text-teal-700"></i> Captured Assessments
            </h2>
            <div id="assessments-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>
    </main>

    <!-- Analysis Modal -->
    <div id="analysis-modal" class="hidden fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl max-w-4xl w-full p-4 relative">
            <button onclick="closeModal()" class="absolute -top-10 right-0 text-white text-xl"><i class="fa-solid fa-times"></i></button>
            <div id="canvas-container" class="relative cursor-crosshair">
                <canvas id="analysis-canvas" class="w-full h-auto rounded"></canvas>
            </div>
            <div class="mt-4 flex gap-4">
                <button onclick="calculateAngle()" class="bg-teal-700 text-white px-4 py-2 rounded">Calculate Angle</button>
                <button onclick="resetAnalysis()" class="bg-gray-200 px-4 py-2 rounded">Reset Points</button>
            </div>
            <div id="angle-result" class="mt-2 text-xl font-bold text-teal-800"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('input-video');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        const assessmentsGrid = document.getElementById('assessments-grid');
        const capturedSection = document.getElementById('captured-section');
        let currentPoseData = null;

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        pose.onResults((results) => {
            document.getElementById('loading-overlay').style.display = 'none';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            if (results.poseLandmarks) {
                currentPoseData = results.poseLandmarks;
                const filtered = currentPoseData.map((lm, idx) => (idx >= 17 && idx <= 22 && !document.getElementById('toggle-palm').checked) ? { ...lm, visibility: 0 } : lm);
                const connections = POSE_CONNECTIONS.filter(c => document.getElementById('toggle-palm').checked || (c[0] < 17 && c[1] < 17));
                
                if (document.getElementById('toggle-glow').checked) { ctx.shadowBlur = 10; ctx.shadowColor = '#0d9488'; }
                drawConnectors(ctx, filtered, connections, {color: '#0d9488', lineWidth: 4});
                if (document.getElementById('toggle-joints').checked) drawLandmarks(ctx, filtered.filter(lm => lm.visibility > 0.5), {color: '#f97316', lineWidth: 2, radius: 4});
                ctx.shadowBlur = 0;
            }
        });

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    video.play();
                    const frame = async () => { await pose.send({image: video}); requestAnimationFrame(frame); };
                    frame();
                };
            } catch (err) { document.getElementById('loading-overlay').innerHTML = "<p class='text-red-600'>Camera access denied.</p>"; }
        }

        document.getElementById('capture-btn').addEventListener('click', () => {
            if (!currentPoseData) return;
            capturedSection.classList.remove('hidden');
            const dataUrl = canvas.toDataURL();
            const id = Date.now();
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-xl border border-gray-200 shadow-sm";
            card.innerHTML = `
                <img src="${dataUrl}" class="w-full rounded mb-3">
                <div class="flex gap-2">
                    <button onclick="openAssessment('${dataUrl}', ${JSON.stringify(currentPoseData).replace(/"/g, '&quot;')})" class="flex-1 bg-teal-600 text-white py-2 rounded text-sm">View</button>
                    <button onclick="this.closest('div.bg-white').remove()" class="bg-red-50 text-red-600 px-3 py-2 rounded"><i class="fa-solid fa-trash"></i></button>
                </div>
            `;
            assessmentsGrid.prepend(card);
        });

        let activePoints = [];
        let activePose = null;

        function openAssessment(imgSrc, poseData) {
            activePose = poseData;
            activePoints = [];
            const modal = document.getElementById('analysis-modal');
            const aCanvas = document.getElementById('analysis-canvas');
            const aCtx = aCanvas.getContext('2d');
            const img = new Image();
            img.onload = () => {
                aCanvas.width = img.width; aCanvas.height = img.height;
                aCtx.drawImage(img, 0, 0);
            };
            img.src = imgSrc;
            modal.classList.remove('hidden');
            aCanvas.onclick = (e) => {
                const rect = aCanvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                const y = (e.clientY - rect.top) / rect.height;
                let closest = { dist: 0.05, idx: -1 };
                activePose.forEach((lm, i) => {
                    const d = Math.sqrt(Math.pow(lm.x - x, 2) + Math.pow(lm.y - y, 2));
                    if (d < closest.dist) closest = { dist: d, idx: i };
                });
                if (closest.idx !== -1 && activePoints.length < 3) {
                    activePoints.push(activePose[closest.idx]);
                    aCtx.fillStyle = 'orange';
                    aCtx.beginPath(); aCtx.arc(activePose[closest.idx].x * aCanvas.width, activePose[closest.idx].y * aCanvas.height, 10, 0, Math.PI*2); aCtx.fill();
                }
            };
        }

        function calculateAngle() {
            if (activePoints.length < 3) return;
            const [p1, p2, p3] = activePoints;
            const v1 = { x: p1.x - p2.x, y: p1.y - p2.y };
            const v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
            const dot = v1.x * v2.x + v1.y * v2.y;
            const mag1 = Math.sqrt(v1.x**2 + v1.y**2);
            const mag2 = Math.sqrt(v2.x**2 + v2.y**2);
            const angle = Math.acos(dot / (mag1 * mag2)) * (180 / Math.PI);
            document.getElementById('angle-result').innerText = `Angle: ${angle.toFixed(1)}°`;
        }

        function closeModal() { document.getElementById('analysis-modal').classList.add('hidden'); }
        function resetAnalysis() { activePoints = []; document.getElementById('angle-result').innerText = ''; }

        initCamera();
    </script>
</body>
</html>
