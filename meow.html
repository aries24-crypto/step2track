<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step2Track | Advanced Clinical Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        .gradient-teal { background: linear-gradient(135deg, #0f766e, #115e59); }
        .bg-clinical { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-clinical text-slate-800 font-sans pb-20">

    <header class="bg-white border-b border-slate-200 py-4 px-6 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-slate-200 rounded-xl flex items-center justify-center overflow-hidden">
                    <img src="step2heal.jpeg" alt="Logo" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<i class=\'fa-solid fa-chart-line text-teal-800\'></i>'">
                </div>
                <div>
                    <h1 class="text-2xl font-black text-slate-900 tracking-tight">Step2Track</h1>
                    <p class="text-xs text-orange-600 font-bold italic">Where every step matters</p>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-teal-50 px-4 py-2 rounded-full text-teal-800 font-semibold text-sm">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-teal-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-teal-500"></span></span>
                System Active
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 flex flex-col gap-8">
        <section class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 relative rounded-2xl bg-slate-950 shadow-2xl overflow-hidden aspect-video border-4 border-slate-800">
                <div id="loading" class="absolute inset-0 flex items-center justify-center bg-slate-950 text-slate-400">Initializing Tracking System...</div>
                <video id="video" class="hidden" playsinline muted></video>
                <canvas id="canvas" class="w-full h-full object-cover"></canvas>
            </div>
            
            <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                <h2 class="font-bold text-slate-900 text-lg flex items-center gap-2 border-b pb-4"><i class="fa-solid fa-gear text-teal-700"></i> Assessment Settings</h2>
                <div class="space-y-4">
                    <label class="flex items-center justify-between cursor-pointer"><span>Include Palms</span> <input type="checkbox" id="ctrl-palm" checked class="w-5 h-5 accent-teal-700"></label>
                    <label class="flex items-center justify-between cursor-pointer"><span>Skeletal Glow</span> <input type="checkbox" id="ctrl-glow" checked class="w-5 h-5 accent-teal-700"></label>
                    <button id="capture-btn" class="w-full mt-6 bg-slate-900 hover:bg-slate-800 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all shadow-lg active:scale-95">
                        <i class="fa-solid fa-camera"></i> Capture Frame
                    </button>
                </div>
            </div>
        </section>

        <section id="captured-container" class="hidden">
            <h2 class="text-xl font-black text-slate-900 mb-6 flex items-center gap-3">
                <i class="fa-solid fa-folder-open text-teal-700"></i> Captured History
            </h2>
            <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </section>
    </main>

    <div id="modal" class="fixed inset-0 z-50 bg-slate-900/95 hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-5xl rounded-2xl overflow-hidden flex flex-col shadow-2xl h-[90vh]">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50">
                <h3 class="font-black text-slate-900 text-lg">ROM Analysis Assessment</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-900 text-2xl transition">&times;</button>
            </div>
            <div class="flex-grow overflow-auto p-6 bg-slate-100 flex items-center justify-center">
                <canvas id="analysis-canvas" class="max-w-full shadow-2xl rounded-lg cursor-crosshair"></canvas>
            </div>
            <div class="p-6 border-t flex gap-4 items-center bg-white">
                <button onclick="resetAnalysis()" class="px-6 py-3 bg-slate-100 hover:bg-slate-200 rounded-xl font-bold text-slate-700 transition">Reset Analysis</button>
                <button onclick="downloadAnalysis()" class="px-6 py-3 bg-teal-700 hover:bg-teal-800 text-white rounded-xl font-bold transition shadow-lg">Download Analysed</button>
                <div id="angle-display" class="ml-auto font-black text-2xl text-teal-800 bg-teal-50 px-6 py-2 rounded-lg border border-teal-200">Select 3 points</div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        const pose = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
        pose.setOptions({modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6});
        
        let currentData = null;
        let originalImageData = null;

        pose.onResults(results => {
            document.getElementById('loading').classList.add('hidden');
            ctx.clearRect(0,0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            if(results.poseLandmarks) {
                currentData = results.poseLandmarks;
                const filtered = currentData.map((lm, i) => (i <= 10) ? {...lm, visibility: 0} : lm);
                if(document.getElementById('ctrl-glow').checked) { ctx.shadowBlur = 10; ctx.shadowColor = '#0d9488'; }
                drawConnectors(ctx, filtered, POSE_CONNECTIONS, {color: '#ffffff', lineWidth: 4});
                drawLandmarks(ctx, filtered.filter(l => l.visibility > 0.1), {color: '#ffffff', radius: 5});
                ctx.shadowBlur = 0;
            }
        });

        navigator.mediaDevices.getUserMedia({video: true}).then(s => {
            video.srcObject = s; video.play();
            const loop = async () => { await pose.send({image: video}); requestAnimationFrame(loop); };
            video.onloadedmetadata = () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; loop(); };
        });

        document.getElementById('capture-btn').onclick = () => {
            if(!currentData) return;
            document.getElementById('captured-container').classList.remove('hidden');
            const data = canvas.toDataURL();
            const div = document.createElement('div');
            div.className = "bg-white p-3 rounded-2xl border shadow-md hover:shadow-xl transition";
            div.innerHTML = `<img src="${data}" class="rounded-lg w-full mb-3 aspect-video object-cover"> 
                             <button onclick="viewAssessment('${data}', ${JSON.stringify(currentData).replace(/"/g, '&quot;')})" class="w-full py-2.5 bg-teal-700 hover:bg-teal-800 text-white rounded-lg text-sm font-bold shadow-md">Analyse Now</button>`;
            document.getElementById('grid').prepend(div);
        };

        function viewAssessment(src, poseData) {
            originalImageData = src;
            const modal = document.getElementById('modal'), aCanvas = document.getElementById('analysis-canvas');
            const aCtx = aCanvas.getContext('2d'), img = new Image();
            img.src = src;
            img.onload = () => {
                aCanvas.width = img.width; aCanvas.height = img.height; aCtx.drawImage(img, 0, 0);
                aCanvas.onclick = (e) => handlePointSelect(e, poseData, aCtx, aCanvas);
            };
            modal.classList.remove('hidden');
        }

        let selected = [];
        function handlePointSelect(e, poseData, ctx, can) {
            if(selected.length >= 3) return;
            const rect = can.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width, y = (e.clientY - rect.top) / rect.height;
            let best = {d: 0.08, i: -1};
            poseData.forEach((p, i) => { if(i > 10) { const dist = Math.hypot(p.x - x, p.y - y); if(dist < best.d) best = {d: dist, i}; }});
            if(best.i !== -1) {
                selected.push(poseData[best.i]);
                ctx.fillStyle = '#ea580c'; ctx.beginPath(); ctx.arc(poseData[best.i].x * can.width, poseData[best.i].y * can.height, 15, 0, 7); ctx.fill();
                if(selected.length === 3) drawAngle(ctx, can);
            }
        }

        function drawAngle(ctx, can) {
            const [p1, p2, p3] = selected;
            const angle = Math.abs(Math.atan2(p3.y-p2.y, p3.x-p2.x) - Math.atan2(p1.y-p2.y, p1.x-p2.x)) * 180 / Math.PI;
            const displayAngle = Math.min(angle, 360-angle);
            document.getElementById('angle-display').innerText = `${displayAngle.toFixed(1)}°`;
            
            ctx.strokeStyle = '#ea580c'; ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(p2.x*can.width, p2.y*can.height); ctx.lineTo(p1.x*can.width, p1.y*can.height);
            ctx.moveTo(p2.x*can.width, p2.y*can.height); ctx.lineTo(p3.x*can.width, p3.y*can.height);
            ctx.stroke();

            // Draw arc
            ctx.beginPath();
            const startAngle = Math.atan2(p1.y-p2.y, p1.x-p2.x);
            const endAngle = Math.atan2(p3.y-p2.y, p3.x-p2.x);
            ctx.arc(p2.x*can.width, p2.y*can.height, 50, startAngle, endAngle);
            ctx.stroke();
        }

        function resetAnalysis() {
            selected = [];
            document.getElementById('angle-display').innerText = "Select 3 points";
            const aCanvas = document.getElementById('analysis-canvas'), aCtx = aCanvas.getContext('2d'), img = new Image();
            img.src = originalImageData;
            img.onload = () => aCtx.drawImage(img, 0, 0);
        }

        function downloadAnalysis() {
            const link = document.createElement('a');
            link.download = 'analysed-assessment.png';
            link.href = document.getElementById('analysis-canvas').toDataURL();
            link.click();
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); resetAnalysis(); }
    </script>
</body>
</html>
