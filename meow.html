<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step2Track | Posture Assessment Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <!-- Header Section -->
    <section id="header-section" role="banner" class="bg-slate-800 text-white p-4 shadow-md w-full">
        <nav class="max-w-5xl mx-auto flex items-center justify-between" aria-label="Main Navigation">
            <div class="flex items-center gap-2">
                <span class="text-xl font-bold text-teal-400">Step2Track</span>
                <span class="hidden md:block text-sm text-gray-400">| Posture & Recovery Analyzer</span>
            </div>
            <div id="connection-status" class="flex items-center gap-2" role="status">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-teal-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-teal-500"></span>
                </span>
                <span class="text-sm font-medium">System Online</span>
            </div>
        </nav>
    </section>

    <!-- Main Content Section -->
    <main class="flex-grow flex items-center justify-center p-4">
        <section id="viewport-section" class="w-full max-w-5xl flex flex-col gap-6">
            <!-- Viewport -->
            <div class="relative rounded-2xl p-4 min-h-[50vh] flex flex-col items-center justify-center bg-white border-4 border-teal-800 shadow-2xl overflow-hidden">
                <div id="loading-overlay" class="absolute inset-0 bg-white flex flex-col items-center justify-center z-50">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-teal-800 mb-4"></div>
                    <p class="text-teal-800 font-mono text-sm">Working on it...</p>
                </div>

                <video id="input-video" class="hidden" playsinline muted></video>
                <canvas id="output-canvas" class="w-full h-full object-contain z-10"></canvas>

                <div id="error-panel" class="absolute inset-0 flex flex-col items-center justify-center p-6 bg-white hidden z-50">
                    <i class="fa-solid fa-triangle-exclamation text-rose-500 text-4xl mb-4"></i>
                    <p class="text-gray-800 text-sm text-center mb-4" id="error-message"></p>
                    <button onclick="window.location.reload()" class="bg-rose-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Reload/Retry</button>
                </div>
            </div>

            <!-- Controls -->
            <div class="bg-white border border-gray-300 rounded-xl p-6 flex flex-wrap gap-6 text-gray-700 shadow-sm justify-center">
                <label class="flex items-center gap-2 cursor-pointer text-lg">
                    <input type="checkbox" id="toggle-palm" checked class="accent-teal-700 w-5 h-5"> Palm Assessment
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-lg">
                    <input type="checkbox" id="toggle-glow" checked class="accent-teal-700 w-5 h-5"> Glow Effect
                </label>
            </div>
        </section>
    </main>

    <script>
        (async function() {
            const video = document.getElementById('input-video');
            const canvas = document.getElementById('output-canvas');
            const ctx = canvas.getContext('2d');
            const togglePalm = document.getElementById('toggle-palm');
            const toggleGlow = document.getElementById('toggle-glow');

            const pose = new Pose({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
            });

            pose.setOptions({ 
                modelComplexity: 1, 
                smoothLandmarks: true,
                enableSegmentation: false,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.6 
            });

            pose.onResults((results) => {
                document.getElementById('loading-overlay').style.display = 'none';
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
                
                if (results.poseLandmarks) {
                    const VISIBILITY_THRESHOLD = 0.65;
                    const filteredLandmarks = results.poseLandmarks.map((lm, idx) => 
                        (idx < 11 || (!togglePalm.checked && idx >= 17 && idx <= 22)) 
                            ? { ...lm, visibility: 0 } 
                            : lm
                    );

                    const connections = POSE_CONNECTIONS.filter(c => {
                        const start = filteredLandmarks[c[0]];
                        const end = filteredLandmarks[c[1]];
                        const isPalmConnection = (c[0] >= 17 || c[1] >= 17);
                        if (!togglePalm.checked && isPalmConnection) return false;
                        return start.visibility > VISIBILITY_THRESHOLD && end.visibility > VISIBILITY_THRESHOLD;
                    });

                    if (toggleGlow.checked) {
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = '#0d9488';
                    } else {
                        ctx.shadowBlur = 0;
                    }

                    drawConnectors(ctx, filteredLandmarks, connections, {color: '#0d9488', lineWidth: 5});
                    drawLandmarks(ctx, filteredLandmarks.filter(lm => lm.visibility > VISIBILITY_THRESHOLD), {color: '#f97316', lineWidth: 2, radius: 5});
                    ctx.shadowBlur = 0;
                }
            });

            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                video.play();
                const processFrame = async () => {
                    await pose.send({image: video});
                    requestAnimationFrame(processFrame);
                };
                processFrame();
            };
        })();
    </script>
</body>
</html>
