<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step2Track | Posture & Recovery Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        .branding-font { color: #0f766e; } /* Dark Teal */
        .tagline-font { color: #ea580c; font-style: italic; } /* Orange */
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans text-gray-800">

    <!-- Header Section -->
    <header class="bg-white border-b border-gray-200 p-4 shadow-sm">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center overflow-hidden border border-gray-300">
                    <img src="step2heal.jpeg" alt="Logo" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<i class=\'fa-solid fa-heart-pulse text-teal-700\'></i>'">
                </div>
                <div>
                    <h1 class="text-2xl font-bold branding-font">Step2Track</h1>
                    <p class="tagline-font text-sm">where every step matters</p>
                </div>
            </div>
            <div class="text-sm font-medium text-teal-700 bg-teal-50 px-3 py-1 rounded-full border border-teal-100">
                <i class="fa-solid fa-circle-dot animate-pulse mr-2"></i> System Active
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-4">
        <section class="w-full max-w-5xl flex flex-col gap-6">
            <!-- Viewport -->
            <div class="relative rounded-2xl bg-gray-900 shadow-xl overflow-hidden aspect-video border-4 border-white ring-1 ring-gray-200">
                <div id="loading-overlay" class="absolute inset-0 bg-gray-100 flex flex-col items-center justify-center z-50">
                    <div class="animate-spin rounded-full h-10 w-10 border-t-4 border-teal-600 mb-4"></div>
                    <p class="text-gray-600 font-medium">Initializing camera...</p>
                </div>
                <video id="input-video" class="hidden" playsinline muted></video>
                <canvas id="output-canvas" class="w-full h-full object-cover"></canvas>
            </div>

            <!-- Controls -->
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200 flex flex-wrap gap-6 items-center justify-between">
                <div class="flex flex-wrap gap-6">
                    <label class="flex items-center gap-2 cursor-pointer font-medium hover:text-teal-700 transition">
                        <input type="checkbox" id="toggle-palm" checked class="accent-teal-700 w-5 h-5"> Palm Landmarks
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer font-medium hover:text-teal-700 transition">
                        <input type="checkbox" id="toggle-glow" checked class="accent-teal-700 w-5 h-5"> Skeletal Glow
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer font-medium hover:text-teal-700 transition">
                        <input type="checkbox" id="toggle-joints" checked class="accent-teal-700 w-5 h-5"> Joint Dots
                    </label>
                </div>
                <button id="capture-btn" class="bg-teal-700 hover:bg-teal-800 text-white px-6 py-2 rounded-lg font-bold transition shadow-md flex items-center gap-2">
                    <i class="fa-solid fa-camera"></i> Capture Assessment
                </button>
            </div>
        </section>
    </main>

    <script>
        const video = document.getElementById('input-video');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        const togglePalm = document.getElementById('toggle-palm');
        const toggleGlow = document.getElementById('toggle-glow');
        const toggleJoints = document.getElementById('toggle-joints');
        const captureBtn = document.getElementById('capture-btn');

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({ 
            modelComplexity: 1, 
            smoothLandmarks: true,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6 
        });

        pose.onResults((results) => {
            document.getElementById('loading-overlay').style.display = 'none';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            
            if (results.poseLandmarks) {
                const VISIBILITY_THRESHOLD = 0.5;
                const filteredLandmarks = results.poseLandmarks.map((lm, idx) => 
                    (idx >= 17 && idx <= 22 && !togglePalm.checked) ? { ...lm, visibility: 0 } : lm
                );

                const connections = POSE_CONNECTIONS.filter(c => {
                    if (!togglePalm.checked && (c[0] >= 17 || c[1] >= 17)) return false;
                    return true;
                });

                if (toggleGlow.checked) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#0d9488';
                }

                drawConnectors(ctx, filteredLandmarks, connections, {color: '#0d9488', lineWidth: 4});
                if (toggleJoints.checked) {
                    drawLandmarks(ctx, filteredLandmarks.filter(lm => lm.visibility > VISIBILITY_THRESHOLD), {color: '#f97316', lineWidth: 2, radius: 4});
                }
                ctx.shadowBlur = 0;
            }
        });

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    video.play();
                    const processFrame = async () => {
                        await pose.send({image: video});
                        requestAnimationFrame(processFrame);
                    };
                    processFrame();
                };
            } catch (err) {
                document.getElementById('loading-overlay').innerHTML = `<p class='text-red-600'>Camera access denied.</p>`;
            }
        }

        captureBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `assessment-${new Date().getTime()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });

        initCamera();
    </script>
</body>
</html>
