<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Step2Track | Clinical ROM Assessment</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<style>
    :root{
        --clinical-bg:#edf5f4;
        --panel:#f7fbfb;
        --panel-2:#ffffff;
        --teal:#58b9b4;
        --teal-dark:#2b8d88;
        --teal-glow:#74d9d3;
        --orange:#f29a3f;
        --orange-dark:#ea7f17;
        --border:#d9e6e5;
        --text:#27323a;
    }

    *{
        box-sizing:border-box;
    }

    body{
        margin:0;
        background:linear-gradient(180deg,#f2f7f7 0%, #edf5f4 100%);
        font-family:Inter, ui-sans-serif, system-ui;
        color:var(--text);
        min-height:100vh;
    }

    .clinical-shell{
        max-width:1600px;
        margin:auto;
        padding:20px;
    }

    .glass-panel{
        background:rgba(248,252,252,.94);
        border:1px solid var(--border);
        border-radius:28px;
        box-shadow:
            0 10px 30px rgba(31,41,55,.08),
            0 2px 6px rgba(31,41,55,.05);
        backdrop-filter:blur(8px);
    }

    .soft-panel{
        background:#f9fcfc;
        border:1px solid #dbe9e8;
        border-radius:22px;
        box-shadow:
            0 4px 10px rgba(15,23,42,.05),
            0 1px 2px rgba(15,23,42,.04);
    }

    .clinical-btn{
        border:none;
        border-radius:14px;
        padding:12px 18px;
        font-weight:700;
        transition:.2s ease;
        cursor:pointer;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:10px;
    }

    .clinical-btn:hover{
        transform:translateY(-1px);
    }

    .clinical-btn:active{
        transform:scale(.98);
    }

    .btn-teal{
        background:linear-gradient(135deg,#6bc6c1,#4ca7a2);
        color:white;
        box-shadow:0 10px 20px rgba(76,167,162,.25);
    }

    .btn-orange{
        background:linear-gradient(135deg,#f5a44d,#ef8f2d);
        color:white;
        box-shadow:0 10px 20px rgba(242,154,63,.22);
    }

    .btn-light{
        background:#edf6f5;
        color:#334155;
        border:1px solid #d6e6e5;
    }

    .toggle-wrap{
        display:flex;
        align-items:center;
        gap:10px;
    }

    .toggle{
        position:relative;
        width:54px;
        height:28px;
    }

    .toggle input{
        display:none;
    }

    .toggle-slider{
        position:absolute;
        inset:0;
        background:#d9e4e3;
        border-radius:999px;
        transition:.2s;
        cursor:pointer;
    }

    .toggle-slider::before{
        content:'';
        position:absolute;
        width:22px;
        height:22px;
        left:3px;
        top:3px;
        background:white;
        border-radius:50%;
        transition:.2s;
        box-shadow:0 2px 6px rgba(0,0,0,.15);
    }

    .toggle input:checked + .toggle-slider{
        background:#67c5bf;
    }

    .toggle input:checked + .toggle-slider::before{
        transform:translateX(26px);
    }

    .video-shell{
        position:relative;
        overflow:hidden;
        border-radius:24px;
        background:#dde9e8;
        border:1px solid #d4e4e3;
        aspect-ratio:16/10;
    }

    .video-shell canvas{
        width:100%;
        height:100%;
        object-fit:cover;
        display:block;
    }

    .analysis-canvas-shell{
        position:relative;
        overflow:hidden;
        border-radius:18px;
        background:#f3f6f6;
        border:1px solid #dce8e7;
        min-height:600px;
        display:flex;
        align-items:center;
        justify-content:center;
    }

    .analysis-canvas-shell canvas{
        max-width:100%;
        max-height:100%;
        border-radius:12px;
    }

    .assessment-card{
        background:white;
        border-radius:18px;
        border:1px solid #dbe7e6;
        box-shadow:0 4px 10px rgba(15,23,42,.05);
        overflow:hidden;
        transition:.2s ease;
    }

    .assessment-card:hover{
        transform:translateY(-2px);
        box-shadow:0 14px 30px rgba(15,23,42,.08);
    }

    .mini-analysis{
        border-radius:14px;
        overflow:hidden;
        border:1px solid #dce8e7;
        background:white;
        cursor:pointer;
        transition:.2s;
    }

    .mini-analysis:hover{
        transform:scale(1.02);
    }

    .status-pulse{
        position:relative;
        width:10px;
        height:10px;
        border-radius:50%;
        background:#3bb17f;
    }

    .status-pulse::after{
        content:'';
        position:absolute;
        inset:-4px;
        border-radius:50%;
        border:2px solid rgba(59,177,127,.35);
        animation:pulse 1.8s infinite;
    }

    @keyframes pulse{
        0%{transform:scale(.5);opacity:1}
        100%{transform:scale(2);opacity:0}
    }

    .scrollbar::-webkit-scrollbar{
        width:8px;
    }

    .scrollbar::-webkit-scrollbar-thumb{
        background:#d2e2e1;
        border-radius:999px;
    }
</style>
</head>

<body>

<header class="bg-[#f7fbfb]/95 backdrop-blur-md border-b border-[#dbe7e6] sticky top-0 z-50">
    <div class="clinical-shell py-4 flex items-center justify-between">

        <div class="flex items-center gap-4">
            <div class="w-14 h-14 rounded-2xl overflow-hidden bg-white border border-[#dbe7e6] shadow-sm">
                <img
                    src="step2heal.jpeg"
                    class="w-full h-full object-cover"
                    onerror="this.parentElement.innerHTML='<div class=&quot;w-full h-full flex items-center justify-center text-2xl text-teal-700&quot;><i class=&quot;fa-solid fa-heart-pulse&quot;></i></div>'"
                />
            </div>

            <div>
                <h1 class="text-[34px] leading-none font-black tracking-tight">
                    <span class="text-[#f29a3f]">Step</span><span class="text-[#3f7f7c]">2</span><span class="text-[#356d6a]">Track</span>
                </h1>

                <p class="text-[12px] text-[#ef8f2d] font-semibold italic mt-1">
                    Where every step matters
                </p>
            </div>
        </div>

        <div class="flex items-center gap-3 px-5 py-3 rounded-full border border-[#d8e7e6] bg-white shadow-sm">
            <div class="status-pulse"></div>
            <span class="text-sm font-semibold text-slate-700">System Active</span>
        </div>

    </div>
</header>

<main class="clinical-shell">

    <div class="grid xl:grid-cols-[1.05fr_1.4fr] gap-8">

        <!-- LEFT SIDE -->
        <section class="space-y-7">

            <!-- LIVE TRACKING -->
            <div class="glass-panel p-5">

                <h2 class="text-[34px] font-black tracking-tight mb-5 text-slate-800">
                    Live Tracking
                </h2>

                <div class="video-shell">
                    <div id="loading"
                         class="absolute inset-0 flex items-center justify-center bg-[#eaf3f2] text-slate-500 font-semibold z-10">
                        Initializing Clinical Tracking...
                    </div>

                    <video id="video" class="hidden" playsinline muted></video>
                    <canvas id="canvas"></canvas>
                </div>

                <!-- CONTROLS -->
                <div class="mt-5 soft-panel p-5">

                    <div class="grid md:grid-cols-3 gap-5">

                        <div class="flex items-center justify-between border-r border-[#e1eceb] pr-4">
                            <div>
                                <p class="font-semibold text-sm">Palm Landmarks</p>
                            </div>

                            <div class="toggle-wrap">
                                <span class="text-xs font-bold text-teal-700">ON</span>
                                <label class="toggle">
                                    <input type="checkbox" id="ctrl-palm" checked>
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>

                        <div class="flex items-center justify-between border-r border-[#e1eceb] pr-4">
                            <div>
                                <p class="font-semibold text-sm">Skeletal Glow</p>
                            </div>

                            <div class="toggle-wrap">
                                <span class="text-xs font-bold text-teal-700">ON</span>
                                <label class="toggle">
                                    <input type="checkbox" id="ctrl-glow" checked>
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <div>
                                <p class="font-semibold text-sm">Joint Dots</p>
                            </div>

                            <div class="toggle-wrap">
                                <span class="text-xs font-bold text-teal-700">ON</span>
                                <label class="toggle">
                                    <input type="checkbox" id="ctrl-joints" checked>
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>

                    </div>

                    <button id="capture-btn"
                            class="clinical-btn btn-teal w-full mt-5 py-4 text-lg">
                        <i class="fa-solid fa-camera"></i>
                        Capture Assessment
                    </button>

                </div>
            </div>

            <!-- CAPTURED -->
            <div>

                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-[32px] font-black tracking-tight">
                        Captured Assessments
                    </h2>

                    <div class="text-sm text-slate-500 font-medium">
                        Landmark Data storage: <span id="storage-count">0</span>
                    </div>
                </div>

                <div id="captured-container">
                    <div id="grid" class="grid md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
                </div>

            </div>

        </section>

        <!-- RIGHT SIDE -->
        <section>

            <div class="glass-panel p-6">

                <!-- TOP -->
                <div class="flex flex-wrap gap-4 items-center justify-between mb-5">

                    <h2 class="text-[34px] font-black tracking-tight">
                        Analysis Assessment
                    </h2>

                    <div class="flex flex-wrap gap-3">

                        <button onclick="downloadAnalysis()"
                                class="clinical-btn btn-light">
                            <i class="fa-solid fa-download"></i>
                            Download Analysed Image
                        </button>

                        <button onclick="resetAnalysis()"
                                class="clinical-btn btn-orange">
                            <i class="fa-solid fa-rotate-right"></i>
                            Reset Analysis
                        </button>

                    </div>

                </div>

                <!-- BODY -->
                <div class="grid lg:grid-cols-[1fr_150px] gap-5">

                    <!-- MAIN CANVAS -->
                    <div class="analysis-canvas-shell">
                        <canvas id="analysis-canvas" class="cursor-crosshair"></canvas>
                    </div>

                    <!-- SIDEBAR -->
                    <div class="space-y-4 max-h-[760px] overflow-auto scrollbar">

                        <button onclick="undoSelection()"
                                class="clinical-btn btn-light w-full">
                            Undo Selection
                        </button>

                        <div id="analysis-history" class="space-y-3"></div>

                        <div class="text-center pt-2">
                            <p class="text-sm font-semibold text-slate-700">
                                View Analysis
                            </p>
                        </div>

                    </div>

                </div>

                <!-- BOTTOM -->
                <div class="mt-5 flex flex-wrap gap-4 items-center">

                    <button onclick="downloadAnalysis()"
                            class="clinical-btn btn-light">
                        <i class="fa-solid fa-download"></i>
                        Download Analysed Image
                    </button>

                    <button onclick="resetAnalysis()"
                            class="clinical-btn btn-orange">
                        Reset Analysis
                    </button>

                    <button onclick="undoSelection()"
                            class="clinical-btn btn-light">
                        Undo Selection
                    </button>

                    <div id="angle-display"
                         class="ml-auto bg-[#edf7f6] border border-[#d7e8e6] rounded-2xl px-6 py-3 text-[#2d7f7b] font-black text-2xl">
                        Select 3 points
                    </div>

                </div>

            </div>

        </section>

    </div>

</main>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const pose = new Pose({
    locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
});

pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.6
});

let currentData = null;
let originalImageData = null;
let selected = [];
let capturedCount = 0;

const analysisCanvas = document.getElementById('analysis-canvas');
const analysisCtx = analysisCanvas.getContext('2d');

pose.onResults(results => {

    document.getElementById('loading').classList.add('hidden');

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(results.image,0,0,canvas.width,canvas.height);

    if(results.poseLandmarks){

        currentData = results.poseLandmarks;

        const showPalms = document.getElementById('ctrl-palm').checked;
        const showGlow = document.getElementById('ctrl-glow').checked;
        const showJoints = document.getElementById('ctrl-joints').checked;

        const filtered = currentData.map((lm,i)=>{

            if(i <= 10){
                return {...lm, visibility:0};
            }

            if(!showPalms && [17,19,21,18,20,22].includes(i)){
                return {...lm, visibility:0};
            }

            return lm;
        });

        if(showGlow){
            ctx.shadowBlur = 16;
            ctx.shadowColor = '#67d9d3';
        }

        drawConnectors(
            ctx,
            filtered,
            POSE_CONNECTIONS,
            {
                color:'#67d9d3',
                lineWidth:4
            }
        );

        ctx.shadowBlur = 0;

        if(showJoints){
            drawLandmarks(
                ctx,
                filtered.filter(l=>l.visibility > 0.1),
                {
                    color:'#f29a3f',
                    fillColor:'#f29a3f',
                    radius:4
                }
            );
        }
    }
});

navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{

    video.srcObject = stream;
    video.play();

    const loop = async()=>{
        await pose.send({image:video});
        requestAnimationFrame(loop);
    };

    video.onloadedmetadata = ()=>{

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        loop();
    };
});

document.getElementById('capture-btn').onclick = ()=>{

    if(!currentData) return;

    const data = canvas.toDataURL();

    capturedCount++;
    document.getElementById('storage-count').innerText = capturedCount;

    const card = document.createElement('div');

    card.className = 'assessment-card p-3';

    card.innerHTML = `
        <img src="${data}"
             class="w-full rounded-xl aspect-video object-cover mb-3">

        <div class="space-y-2">

            <button
                class="clinical-btn btn-teal w-full py-2 text-sm"
                onclick='viewAssessment("${data}", ${JSON.stringify(currentData).replace(/"/g,'&quot;')})'>
                View/Analyse
            </button>

            <button
                class="clinical-btn btn-light w-full py-2 text-sm"
                onclick="downloadCapture('${data}')">
                Download
            </button>

            <button
                class="clinical-btn btn-light w-full py-2 text-sm"
                onclick='viewAssessment("${data}", ${JSON.stringify(currentData).replace(/"/g,'&quot;')})'>
                Analyse Picture
            </button>

            <button
                class="clinical-btn w-full py-2 text-sm border border-red-200 bg-red-50 text-red-500"
                onclick="this.closest('.assessment-card').remove()">
                Delete
            </button>

        </div>
    `;

    document.getElementById('grid').prepend(card);

    addMiniHistory(data);
};

function addMiniHistory(data){

    const mini = document.createElement('div');

    mini.className = 'mini-analysis';

    mini.innerHTML = `
        <img src="${data}" class="w-full aspect-[4/5] object-cover">
    `;

    mini.onclick = ()=>{

        const img = new Image();

        img.src = data;

        img.onload = ()=>{

            analysisCanvas.width = img.width;
            analysisCanvas.height = img.height;

            analysisCtx.drawImage(img,0,0);
        };
    };

    document.getElementById('analysis-history').prepend(mini);
}

function viewAssessment(src, poseData){

    originalImageData = src;

    const img = new Image();

    img.src = src;

    img.onload = ()=>{

        analysisCanvas.width = img.width;
        analysisCanvas.height = img.height;

        analysisCtx.drawImage(img,0,0);

        analysisCanvas.onclick = (e)=>{
            handlePointSelect(e, poseData, analysisCtx, analysisCanvas);
        };
    };
}

function handlePointSelect(e, ctxData, ctxRef, can){

    if(selected.length >= 3) return;

    const rect = can.getBoundingClientRect();

    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;

    let best = {
        d:0.08,
        i:-1
    };

    ctxData.forEach((p,i)=>{

        if(i > 10){

            const dist = Math.hypot(p.x - x, p.y - y);

            if(dist < best.d){
                best = {d:dist, i};
            }
        }
    });

    if(best.i !== -1){

        const point = ctxData[best.i];

        selected.push(point);

        const px = point.x * can.width;
        const py = point.y * can.height;

        ctxRef.beginPath();
        ctxRef.fillStyle = '#f28d2e';
        ctxRef.arc(px, py, 18, 0, Math.PI * 2);
        ctxRef.fill();

        ctxRef.fillStyle = '#ffffff';
        ctxRef.font = 'bold 16px Arial';
        ctxRef.textAlign = 'center';
        ctxRef.textBaseline = 'middle';
        ctxRef.fillText(selected.length, px, py);

        if(selected.length === 3){
            drawAngle(ctxRef, can);
        }
    }
}

function drawAngle(ctxRef, can){

    const [p1,p2,p3] = selected;

    const angle = Math.abs(
        Math.atan2(p3.y-p2.y,p3.x-p2.x) -
        Math.atan2(p1.y-p2.y,p1.x-p2.x)
    ) * 180 / Math.PI;

    const displayAngle = Math.min(angle,360-angle);

    document.getElementById('angle-display').innerText =
        `Elbow ROM: ${displayAngle.toFixed(0)}°`;

    const p1x = p1.x * can.width;
    const p1y = p1.y * can.height;

    const p2x = p2.x * can.width;
    const p2y = p2.y * can.height;

    const p3x = p3.x * can.width;
    const p3y = p3.y * can.height;

    ctxRef.lineCap = 'round';

    ctxRef.shadowBlur = 14;
    ctxRef.shadowColor = '#63d5cf';

    ctxRef.strokeStyle = '#63d5cf';
    ctxRef.lineWidth = 8;

    ctxRef.beginPath();
    ctxRef.moveTo(p2x,p2y);
    ctxRef.lineTo(p1x,p1y);
    ctxRef.stroke();

    ctxRef.beginPath();
    ctxRef.moveTo(p2x,p2y);
    ctxRef.lineTo(p3x,p3y);
    ctxRef.stroke();

    ctxRef.shadowBlur = 0;

    const startAngle = Math.atan2(p1y-p2y,p1x-p2x);
    const endAngle = Math.atan2(p3y-p2y,p3x-p2x);

    ctxRef.strokeStyle = '#f29a3f';
    ctxRef.lineWidth = 6;

    ctxRef.beginPath();
    ctxRef.arc(
        p2x,
        p2y,
        70,
        startAngle,
        endAngle
    );
    ctxRef.stroke();

    ctxRef.fillStyle = '#111827';
    ctxRef.font = 'bold 32px Arial';

    ctxRef.fillText(
        `Elbow ROM: ${displayAngle.toFixed(0)}°`,
        p2x + 80,
        p2y - 40
    );
}

function resetAnalysis(){

    selected = [];

    document.getElementById('angle-display').innerText =
        'Select 3 points';

    if(!originalImageData) return;

    const img = new Image();

    img.src = originalImageData;

    img.onload = ()=>{
        analysisCtx.clearRect(
            0,
            0,
            analysisCanvas.width,
            analysisCanvas.height
        );

        analysisCtx.drawImage(img,0,0);
    };
}

function undoSelection(){

    if(selected.length === 0) return;

    selected.pop();

    resetAnalysis();

    if(selected.length === 0) return;
}

function downloadAnalysis(){

    const link = document.createElement('a');

    link.download = 'analysed-assessment.png';

    link.href = analysisCanvas.toDataURL();

    link.click();
}

function downloadCapture(src){

    const link = document.createElement('a');

    link.download = 'captured-assessment.png';

    link.href = src;

    link.click();
}

</script>

</body>
</html>
